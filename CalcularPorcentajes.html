<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Calc">
<title>Calculadora de Operaciones</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #08090e;
    --bg-card: #0f1118;
    --bg-card-hover: #141620;
    --bg-input: #0c0d15;
    --border: #1a1d2e;
    --border-glow: #2a2f4a;
    --border-focus: #00e5ff;
    --text-primary: #e8eaf0;
    --text-secondary: #6b7194;
    --text-muted: #3d4162;
    --accent-cyan: #00e5ff;
    --accent-cyan-dim: #00e5ff22;
    --accent-green: #00ffaa;
    --accent-green-dim: #00ffaa18;
    --accent-amber: #ffb800;
    --accent-amber-dim: #ffb80018;
    --accent-rose: #ff3d71;
    --accent-rose-dim: #ff3d7112;
    --accent-purple: #a78bfa;
    --accent-purple-dim: #a78bfa12;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html { height: 100%; background: var(--bg-primary); }

  body {
    min-height: 100%;
    font-family: 'Outfit', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    display: flex;
    justify-content: center;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      linear-gradient(90deg, #ffffff03 1px, transparent 1px),
      linear-gradient(0deg, #ffffff03 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background:
      radial-gradient(ellipse at 30% 20%, #00e5ff06 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, #a78bfa04 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
    animation: ambientDrift 20s ease-in-out infinite alternate;
  }

  @keyframes ambientDrift {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(-3%, 2%) rotate(1deg); }
  }

  .wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 500px;
    padding: 20px;
    padding-top: calc(max(env(safe-area-inset-top, 16px), 16px) + 24px);
    padding-bottom: calc(max(env(safe-area-inset-bottom, 16px), 16px) + 24px);
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeSlideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent-cyan);
    background: var(--accent-cyan-dim);
    border: 1px solid #00e5ff20;
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 20px;
  }

  .header-label .pulse-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-cyan);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 #00e5ff60; }
    50% { opacity: 0.7; box-shadow: 0 0 0 6px #00e5ff00; }
  }

  .header h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #e8eaf0, #8b90b0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Section labels */
  .section-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 2.5px;
    margin-bottom: 14px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  /* Input fields */
  .field { margin-bottom: 12px; }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 6px;
    padding-left: 4px;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap .unit {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    pointer-events: none;
  }

  .field input[type="number"] {
    width: 100%;
    background: var(--bg-card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 50px 14px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(16px, 4.5vw, 18px);
    color: var(--text-primary);
    outline: none;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    -webkit-appearance: none;
  }

  .field input[type="number"]::placeholder {
    color: var(--text-muted);
    opacity: 0.5;
  }

  .field input[type="number"]:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px #00e5ff10, 0 0 20px #00e5ff08;
    background: var(--bg-card-hover);
  }

  /* Risk box */
  .risk-box {
    background: var(--bg-card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 14px;
    transition: border-color 0.3s;
  }

  .risk-box:hover {
    border-color: var(--border-glow);
  }

  .risk-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .risk-header label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }

  .risk-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent-amber);
    text-shadow: 0 0 20px #ffb80030;
  }

  /* Slider */
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 4px;
    background: linear-gradient(to right, var(--accent-amber) 0%, var(--accent-amber) var(--fill, 40%), #1a1d2e var(--fill, 40%));
    outline: none;
    margin: 0;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--accent-amber);
    box-shadow: 0 0 16px #ffb80040, 0 2px 8px rgba(0,0,0,0.5);
    cursor: pointer;
    border: 3px solid var(--bg-primary);
    transition: transform 0.2s;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.15);
  }

  /* Quick buttons */
  .quick-btns {
    display: flex;
    gap: 6px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .quick-btn {
    flex: 1 1 0;
    min-width: 0;
    padding: 8px 0;
    border: 1.5px solid var(--border);
    border-radius: 100px;
    background: transparent;
    color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(11px, 3vw, 12px);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }

  .quick-btn:hover {
    border-color: #ffb80040;
    color: var(--accent-amber);
    background: var(--accent-amber-dim);
  }

  .quick-btn.active {
    border-color: var(--accent-amber);
    color: var(--accent-amber);
    background: var(--accent-amber-dim);
    box-shadow: 0 0 16px #ffb80010;
  }

  /* Divider */
  .divider {
    height: 1px;
    margin: 24px 0;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }

  /* Result cards */
  .card {
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--bg-card);
    transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .card:hover {
    border-color: var(--border-glow);
    transform: translateY(-1px);
  }

  .card .glow {
    position: absolute;
    top: -60%; right: -25%;
    width: 180px; height: 180px;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.2;
    pointer-events: none;
  }

  .card.cyan .glow { background: var(--accent-cyan); }
  .card.cyan { border-color: #00e5ff12; }
  .card.rose .glow { background: var(--accent-rose); }
  .card.rose { border-color: #ff3d7112; }

  .card-top {
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    z-index: 1;
  }

  .card-icon {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
  }

  .cyan .card-icon { background: var(--accent-cyan-dim); color: var(--accent-cyan); border: 1px solid #00e5ff20; }
  .rose .card-icon { background: var(--accent-rose-dim); color: var(--accent-rose); border: 1px solid #ff3d7120; }

  .card-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .card-detail {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 8px;
    position: relative;
    z-index: 1;
    min-height: 14px;
  }

  .card-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(28px, 8vw, 36px);
    font-weight: 700;
    margin-top: 6px;
    position: relative;
    z-index: 1;
    transition: transform 0.12s ease;
    font-variant-numeric: tabular-nums;
  }

  .cyan .card-val { color: var(--accent-cyan); text-shadow: 0 0 30px #00e5ff15; }
  .rose .card-val { color: var(--accent-rose); text-shadow: 0 0 30px #ff3d7115; }

  .card-val.pop { transform: scale(1.03); }
  .card-val .muted { color: var(--text-muted); font-size: 14px; }

  /* Entrance animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .anim {
    opacity: 0;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .a1 { animation-delay: 0.05s; }
  .a2 { animation-delay: 0.10s; }
  .a3 { animation-delay: 0.15s; }
  .a4 { animation-delay: 0.22s; }
  .a5 { animation-delay: 0.30s; }
  .a6 { animation-delay: 0.38s; }
  .a7 { animation-delay: 0.46s; }

  /* Footer */
  .foot {
    text-align: center;
    margin-top: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
    opacity: 0.5;
  }

  /* Responsive */
  @media (max-width: 400px) {
    .wrap { padding: 14px; }
    .header h1 { font-size: 26px; }
  }

  /* Remove number spinners */
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input[type="number"] { -moz-appearance: textfield; }
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div class="header-label"><span class="pulse-dot"></span> Position Sizing</div>
    <h1>Calculadora</h1>
  </div>

  <div class="section-label anim a1">Datos de entrada</div>

  <div class="field anim a2">
    <label>Balance de Borja</label>
    <div class="input-wrap">
      <input type="number" inputmode="decimal" id="inp1" placeholder="0.00">
      <span class="unit">USDT</span>
    </div>
  </div>

  <div class="field anim a2">
    <label>Operación Borja</label>
    <div class="input-wrap">
      <input type="number" inputmode="decimal" id="inp2" placeholder="0.00">
      <span class="unit">USDT</span>
    </div>
  </div>

  <div class="field anim a3">
    <label>Balance de tu cuenta</label>
    <div class="input-wrap">
      <input type="number" inputmode="decimal" id="inp3" placeholder="0.00">
      <span class="unit">USDT</span>
    </div>
  </div>

  <div class="divider anim a3"></div>

  <div class="section-label anim a3">Tu operación</div>

  <div class="card cyan anim a4">
    <div class="glow"></div>
    <div class="card-top">
      <div class="card-icon">%</div>
      <div class="card-label">Cantidad de tu operación</div>
    </div>
    <div class="card-detail" id="det1">Introduce valores arriba</div>
    <div class="card-val" id="val1"><span class="muted">—</span></div>
  </div>

  <div class="divider anim a4"></div>

  <div class="section-label anim a5">Gestión de riesgo</div>

  <div class="risk-box anim a5">
    <div class="risk-header">
      <label>Porcentaje máximo</label>
      <div class="risk-value" id="riskDisplay">2.00%</div>
    </div>
    <input type="range" id="slider" min="0" max="500" value="200" step="25">
    <div class="quick-btns">
      <button class="quick-btn" data-val="50">0.5%</button>
      <button class="quick-btn" data-val="100">1%</button>
      <button class="quick-btn" data-val="150">1.5%</button>
      <button class="quick-btn" data-val="200">2%</button>
      <button class="quick-btn" data-val="250">2.5%</button>
      <button class="quick-btn" data-val="300">3%</button>
    </div>
  </div>

  <div class="divider anim a6"></div>

  <div class="section-label anim a6">Pérdida máxima</div>

  <div class="card rose anim a7">
    <div class="glow"></div>
    <div class="card-top">
      <div class="card-icon">↓</div>
      <div class="card-label">Máximo a perder</div>
    </div>
    <div class="card-detail" id="det2">Ajusta el riesgo arriba</div>
    <div class="card-val" id="val2"><span class="muted">—</span></div>
  </div>

  <div class="foot">Desliza el slider o pulsa un botón rápido</div>
</div>

<script>
  const inp1 = document.getElementById('inp1');
  const inp2 = document.getElementById('inp2');
  const inp3 = document.getElementById('inp3');
  const slider = document.getElementById('slider');
  const riskDisplay = document.getElementById('riskDisplay');
  const val1 = document.getElementById('val1');
  const val2 = document.getElementById('val2');
  const det1 = document.getElementById('det1');
  const det2 = document.getElementById('det2');
  const btns = document.querySelectorAll('.quick-btn');

  function fmt(n) {
    return n.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function pop(el) {
    el.classList.add('pop');
    setTimeout(() => el.classList.remove('pop'), 150);
  }

  function updateBtns() {
    const v = parseInt(slider.value);
    btns.forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.val) === v);
    });
  }

  function updateSliderFill() {
    const pct = (slider.value / 500) * 100;
    slider.style.setProperty('--fill', pct + '%');
  }

  function calc() {
    const a = parseFloat(inp1.value) || 0;
    const b = parseFloat(inp2.value) || 0;
    const c = parseFloat(inp3.value) || 0;
    const risk = slider.value / 100;

    updateSliderFill();
    updateBtns();
    riskDisplay.textContent = risk.toFixed(2) + '%';
    det2.textContent = risk.toFixed(2) + '% de tu balance';

    if (a > 0 && b > 0 && c > 0) {
      const pctOp = (b / a) * 100;
      const res = (b / a) * c;
      const loss = c * (risk / 100);

      val1.textContent = fmt(res) + ' USDT';
      val2.textContent = fmt(loss) + ' USDT';
      det1.textContent = fmt(pctOp) + '% del balance de Borja';

      pop(val1);
      pop(val2);
    } else {
      val1.innerHTML = '<span class="muted">—</span>';
      val2.innerHTML = '<span class="muted">—</span>';
      det1.textContent = 'Introduce valores arriba';
    }
  }

  inp1.addEventListener('input', calc);
  inp2.addEventListener('input', calc);
  inp3.addEventListener('input', calc);
  slider.addEventListener('input', calc);

  btns.forEach(btn => {
    btn.addEventListener('click', () => {
      slider.value = btn.dataset.val;
      calc();
    });
  });

  updateSliderFill();
  updateBtns();
</script>
</body>
</html>
